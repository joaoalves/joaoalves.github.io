# =============================================================
# João Alves — Personal Academic Website
# Minimal Mistakes Jekyll Theme
# =============================================================

theme                  : "minimal-mistakes-jekyll"
minimal_mistakes_skin  : "contrast"   # cleanest black/white skin
                                      # alternatives: "default", "air"

# Site settings
locale        : "en-GB"
title         : "João Alves"
title_separator: "·"
subtitle      : "Professor of Astrophysics"
name          : "João Alves"
description   : "Professor of Astrophysics at the University of Vienna. Research group working on the interstellar medium, star formation, and large-scale Milky Way structure."
url           : "https://joaoalves.github.io"   # ← change to your actual GitHub username
baseurl       : ""
repository    : "joaoalves/joaoalves.github.io" # ← change to your repo

# SEO
twitter:
  username    : ""   # add if you use Twitter/X
og_image      : "/assets/images/profile.jpg"

# Site author — this populates the left sidebar on every page
author:
  name        : "João Alves"
  avatar      : "/assets/images/profile.jpg"   # your photo goes here
  bio         : "Professor of Astrophysics, University of Vienna. ISM · Star formation · Galactic structure."
  location    : "Vienna, Austria"
  email       : "joao.alves@univie.ac.at"      # ← update
  links:
    - label   : "ADS"
      icon    : "fas fa-fw fa-star"
      url     : "https://ui.adsabs.harvard.edu/search/q=author%3A%22Alves%2C+Jo%C3%A3o%22"
    - label   : "ORCID"
      icon    : "fab fa-fw fa-orcid"
      url     : "https://orcid.org/0000-0002-2110-9753"  # ← verify
    - label   : "GitHub"
      icon    : "fab fa-fw fa-github"
      url     : "https://github.com/joaoalves"            # ← update
    - label   : "University page"
      icon    : "fas fa-fw fa-university"
      url     : "https://sternwarte.univie.ac.at"

# Footer links (keep minimal)
footer:
  links:
    - label   : "ADS"
      icon    : "fas fa-fw fa-star"
      url     : "https://ui.adsabs.harvard.edu/search/q=author%3A%22Alves%2C+Jo%C3%A3o%22"
    - label   : "GitHub"
      icon    : "fab fa-fw fa-github"
      url     : "https://github.com/joaoalves"

# Reading / build settings
encoding      : "utf-8"
markdown      : kramdown
highlighter   : rouge
lsi           : false
excerpt_separator: "\n\n"

kramdown:
  input         : GFM
  hard_wrap     : false
  auto_ids      : true
  footnote_nr   : 1
  entity_output : as_char
  toc_levels    : 1..6
  smart_quotes  : lsquo,rsquo,ldquo,rdquo

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink   : /:categories/:title/
timezone    : Europe/Vienna

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Collections — used for the group page
collections:
  group:
    output    : false   # no individual pages per member, just a list

# Front matter defaults — avoids repeating layout: in every file
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout        : single
      author_profile: true   # show the left sidebar on all pages
      read_time     : false
      comments      : false
      share         : false
  - scope:
      path: ""
      type: group
    values:
      layout        : single

# Navigation — defined in _data/navigation.yml (see that file)
